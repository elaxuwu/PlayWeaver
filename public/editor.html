<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayWeaver Editor</title>
    <meta
      name="description"
      content="Shape your PlayWeaver concept on a free-floating canvas and generate a playable prototype."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
      defer
    ></script>
  </head>
  <body class="editor-app" data-page="editor">
    <a href="index.html" class="playweaver-home" aria-label="Return to PlayWeaver home">
      <span class="playweaver-home__mark">PW</span>
      <span class="playweaver-home__wordmark">PlayWeaver</span>
    </a>

    <main class="editor-shell">
      <section
        id="board-canvas"
        class="board-canvas"
        aria-label="PlayWeaver node canvas"
      >
        <div id="board-stage" class="board-stage">
          <svg id="board-links" class="board-links" aria-hidden="true"></svg>
          <div id="board-nodes" class="board-nodes"></div>
        </div>
      </section>

      <section class="editor-card glass-card board-summary-card" aria-label="Editor controls">
        <div class="editor-card__header">
          <p class="editor-eyebrow">PlayWeaver Board</p>
          <h1 id="summary-name" class="editor-heading">Untitled Game</h1>
          <p id="summary-genre" class="editor-subheading">Not defined yet</p>
        </div>

        <div class="editor-action-grid">
          <button id="generate-btn" type="button" class="editor-button editor-button--primary">
            Generate
          </button>
          <button id="open-tab-btn" type="button" class="editor-button" disabled>Open Tab</button>
        </div>

        <div class="editor-stats">
          <div class="editor-stat">
            <span class="editor-stat__label">Nodes</span>
            <strong id="node-count" class="editor-stat__value">0</strong>
          </div>
          <div class="editor-stat">
            <span class="editor-stat__label">Links</span>
            <strong id="link-count" class="editor-stat__value">0</strong>
          </div>
        </div>
        <p id="generate-status" class="editor-status-copy editor-status-copy--muted">
          Ready to generate a playable prototype.
        </p>
      </section>

      <section class="editor-card glass-card preview-card" aria-label="Prototype preview">
        <div class="preview-card__header">
          <div>
            <p class="editor-eyebrow">Prototype</p>
            <h2 class="preview-card__title">Live Preview</h2>
          </div>
          <div class="preview-card__actions">
            <button
              id="download-game-btn"
              type="button"
              class="editor-button preview-action-button"
            >
              Download Game
            </button>
            <button
              id="preview-size-toggle-btn"
              type="button"
              class="editor-button preview-action-button preview-action-button--icon"
              aria-label="Maximize live preview"
              aria-pressed="false"
            >
              <span id="preview-size-toggle-icon" aria-hidden="true">[]</span>
            </button>
          </div>
        </div>

        <div class="preview-frame-wrap">
          <iframe id="game-frame" class="preview-frame" title="Generated PlayWeaver prototype"></iframe>

          <div id="game-loading-overlay" class="game-loading-overlay" aria-hidden="true">
            <div class="game-loading-chip">
              <span id="game-loading-text">Generating...</span>
            </div>
          </div>
        </div>
      </section>

      <div id="preview-backdrop" class="preview-backdrop" aria-hidden="true"></div>

      <div id="canvas-context-menu" class="context-menu hidden" role="menu" aria-label="Canvas menu"></div>

      <div id="link-hint" class="link-hint hidden" aria-live="polite">
        Link mode is active. Click another node to connect it, or press Escape to cancel.
      </div>

      <aside id="debug-panel" class="debug-panel hidden" aria-live="polite">
        <p class="debug-panel__title">Linked Payload</p>
        <pre id="debug-payload" class="debug-panel__payload">{}</pre>
      </aside>
    </main>

    <script src="scripts.js"></script>
  </body>
</html>
